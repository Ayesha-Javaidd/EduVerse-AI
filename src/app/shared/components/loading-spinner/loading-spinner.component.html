<div class="animate-pulse space-y-6">
  <!-- Loading Message -->
  <div class="flex flex-col items-center justify-center py-6 text-center">
    <p class="text-sm font-semibold text-slate-500">
      {{ message }}
    </p>

    <p class="mt-1 text-xs text-slate-400">
      {{ subMessage }}
    </p>
  </div>

  <!-- Header -->
  <div class="h-10 w-64 rounded-xl bg-slate-200"></div>

  <!-- Cards -->
  <div
    *ngFor="let item of [].constructor(cards)"
    class="rounded-[14px] border border-slate-200 bg-white p-6 shadow-sm"
  >
    <div class="space-y-5">
      <div class="h-6 w-48 rounded-lg bg-slate-200"></div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
        <div class="space-y-3">
          <div class="h-4 w-24 rounded bg-slate-200"></div>
          <div class="h-12 w-full rounded-xl bg-slate-200"></div>
        </div>

        <div class="space-y-3">
          <div class="h-4 w-32 rounded bg-slate-200"></div>
          <div class="h-12 w-full rounded-xl bg-slate-200"></div>
        </div>

        <div class="space-y-3">
          <div class="h-4 w-28 rounded bg-slate-200"></div>
          <div class="h-12 w-full rounded-xl bg-slate-200"></div>
        </div>

        <div class="space-y-3">
          <div class="h-4 w-20 rounded bg-slate-200"></div>
          <div class="h-12 w-full rounded-xl bg-slate-200"></div>
        </div>
      </div>

      <div class="flex justify-end pt-4">
        <div class="h-11 w-40 rounded-xl bg-slate-200"></div>
      </div>
    </div>
  </div>
</div>

<app-modal-shell
  *ngIf="assignmentForm"
  [show]="show"
  [title]="editingAssignmentId ? 'Edit Assignment' : 'Create New Assignment'"
  [actionLabel]="
    editingAssignmentId ? 'Update Assignment' : 'Create Assignment'
  "
  [isFormValid]="assignmentForm.valid"
  (close)="closeModal()"
  (submit)="submitForm()"
>
  <form
    *ngIf="assignmentForm"
    [formGroup]="assignmentForm"
    (ngSubmit)="submitForm()"
    class="space-y-6"
  >
    <div>
      <label class="mb-2 block text-sm font-semibold text-[#181F39]">
        Assignment Title *
      </label>
      <input
        type="text"
        formControlName="title"
        class="h-12 w-full rounded-2xl border border-[#dbe4ea] bg-[#f8fafc] px-4 text-sm text-[#181F39] placeholder-slate-400 transition focus:border-[#23A997] focus:bg-white focus:outline-none focus:ring-2 focus:ring-[#23A997]/15"
        placeholder="e.g., Web Development Final Project"
      />
      <p
        *ngIf="
          assignmentForm.get('title')?.touched &&
          assignmentForm.get('title')?.invalid
        "
        class="mt-1 text-sm text-red-500"
      >
        Title is required.
      </p>
    </div>

    <div>
      <label class="mb-2 block text-sm font-semibold text-[#181F39]">
        Select Course *
      </label>
      <select
        formControlName="courseId"
        class="h-12 w-full rounded-2xl border border-[#dbe4ea] bg-[#f8fafc] px-4 text-sm text-[#181F39] transition focus:border-[#23A997] focus:bg-white focus:outline-none focus:ring-2 focus:ring-[#23A997]/15"
      >
        <option value="">Choose a course</option>
        <option *ngFor="let course of courses" [value]="course.id">
          {{ course.title }}
        </option>
      </select>
      <p
        *ngIf="
          assignmentForm.get('courseId')?.touched &&
          assignmentForm.get('courseId')?.invalid
        "
        class="mt-1 text-sm text-red-500"
      >
        Course selection is required.
      </p>
    </div>

    <div>
      <label class="mb-2 block text-sm font-semibold text-[#181F39]">
        Description *
      </label>
      <textarea
        formControlName="description"
        rows="4"
        class="min-h-32 w-full resize-none rounded-2xl border border-[#dbe4ea] bg-[#f8fafc] px-4 py-3 text-sm text-[#181F39] placeholder-slate-400 transition focus:border-[#23A997] focus:bg-white focus:outline-none focus:ring-2 focus:ring-[#23A997]/15"
        placeholder="Describe the assignment requirements..."
      ></textarea>
      <p
        *ngIf="
          assignmentForm.get('description')?.touched &&
          assignmentForm.get('description')?.invalid
        "
        class="mt-1 text-sm text-red-500"
      >
        Description is required.
      </p>
    </div>

    <div class="grid gap-5 md:grid-cols-2">
      <div>
        <label class="mb-2 block text-sm font-semibold text-[#181F39]">
          Due Date *
        </label>
        <input
          type="date"
          formControlName="dueDate"
          class="h-12 w-full rounded-2xl border border-[#dbe4ea] bg-[#f8fafc] px-4 text-sm text-[#181F39] transition focus:border-[#23A997] focus:bg-white focus:outline-none focus:ring-2 focus:ring-[#23A997]/15"
        />
        <p
          *ngIf="
            assignmentForm.get('dueDate')?.touched &&
            assignmentForm.get('dueDate')?.invalid
          "
          class="mt-1 text-sm text-red-500"
        >
          Due date is required.
        </p>
      </div>
      <div>
        <label class="mb-2 block text-sm font-semibold text-[#181F39]">
          Due Time *
        </label>
        <input
          type="time"
          formControlName="dueTime"
          class="h-12 w-full rounded-2xl border border-[#dbe4ea] bg-[#f8fafc] px-4 text-sm text-[#181F39] transition focus:border-[#23A997] focus:bg-white focus:outline-none focus:ring-2 focus:ring-[#23A997]/15"
        />
        <p
          *ngIf="
            assignmentForm.get('dueTime')?.touched &&
            assignmentForm.get('dueTime')?.invalid
          "
          class="mt-1 text-sm text-red-500"
        >
          Due time is required.
        </p>
      </div>
    </div>

    <div class="grid gap-5 md:grid-cols-2">
      <div>
        <label class="mb-2 block text-sm font-semibold text-[#181F39]">
          Total Marks *
        </label>
        <input
          type="number"
          formControlName="totalMarks"
          min="1"
          max="100"
          class="h-12 w-full rounded-2xl border border-[#dbe4ea] bg-[#f8fafc] px-4 text-sm text-[#181F39] transition focus:border-[#23A997] focus:bg-white focus:outline-none focus:ring-2 focus:ring-[#23A997]/15"
        />
        <p
          *ngIf="
            assignmentForm.get('totalMarks')?.touched &&
            assignmentForm.get('totalMarks')?.invalid
          "
          class="mt-1 text-sm text-red-500"
        >
          Total marks is required and must be between 1-100.
        </p>
      </div>
      <div>
        <label class="mb-2 block text-sm font-semibold text-[#181F39]">
          Passing Marks *
        </label>
        <input
          type="number"
          formControlName="passingMarks"
          min="1"
          max="100"
          class="h-12 w-full rounded-2xl border border-[#dbe4ea] bg-[#f8fafc] px-4 text-sm text-[#181F39] transition focus:border-[#23A997] focus:bg-white focus:outline-none focus:ring-2 focus:ring-[#23A997]/15"
        />
        <p
          *ngIf="
            assignmentForm.get('passingMarks')?.touched &&
            assignmentForm.get('passingMarks')?.invalid
          "
          class="mt-1 text-sm text-red-500"
        >
          Passing marks is required and cannot exceed total marks.
        </p>
      </div>
    </div>

    <div>
      <label class="mb-2 block text-sm font-semibold text-[#181F39]">
        Attachments
      </label>
      <div
        class="rounded-[22px] border-2 border-dashed border-[#23A997]/35 bg-[#f8fafc] px-6 py-8 text-center transition hover:border-[#23A997] hover:bg-[#ecf9f6]/50"
      >
        <input
          type="file"
          multiple
          (change)="handleFileUpload($event)"
          class="hidden"
          id="file-upload"
        />
        <label for="file-upload" class="cursor-pointer block">
          <i class="fa-solid fa-upload mb-3 text-3xl text-slate-400"></i>
          <p class="text-sm font-medium text-slate-500">
            Click to upload or drag and drop
          </p>
        </label>
      </div>
      <div *ngIf="attachments.controls.length > 0" class="mt-3 space-y-2">
        <div
          *ngFor="let fileCtrl of attachments.controls; let i = index"
          class="flex items-center justify-between rounded-2xl border border-[#e2e8f0] bg-slate-50 px-4 py-3"
        >
          <span class="text-sm font-medium text-[#181F39]">{{
            fileCtrl.value.name
          }}</span>
          <app-button
            (buttonClick)="removeAttachment(i)"
            customColor="text-red-500 hover:bg-transparent hover:text-red-600"
            [class]="'p-0'"
          >
            <i class="fa-solid fa-trash text-sm"></i>
          </app-button>
        </div>
      </div>
    </div>

    <div class="flex items-center gap-3 rounded-2xl border border-[#e2e8f0] bg-slate-50 px-4 py-3">
      <input
        type="checkbox"
        formControlName="allowLateSubmission"
        class="h-4 w-4 cursor-pointer rounded border-[#cbd5e1] text-[#23A997] focus:ring-[#23A997]/30"
      />
      <label class="cursor-pointer text-sm font-medium text-[#181F39]">
        Allow late submissions
      </label>
    </div>
  </form>
</app-modal-shell>

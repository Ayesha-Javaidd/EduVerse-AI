<div class="transition-all min-h-screen bg-gray-50 flex flex-col">
  <app-header pageTitle="Super Admin Settings"></app-header>
  
  <main class="max-w-4xl mx-auto w-full p-6 lg:p-10 space-y-8 flex-1">
    
    <!-- Skeleton loader for initialization -->
    <div *ngIf="loading" class="animate-pulse space-y-6">
      <div class="h-32 bg-gray-200 rounded-xl w-full"></div>
      <div class="h-48 bg-gray-200 rounded-xl w-full"></div>
    </div>
    
    <!-- Profile & Settings Form UI -->
    <div *ngIf="!loading" class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
      
      <!-- Top aesthetic header for personal profile -->
      <div class="bg-gradient-to-r from-blue-900 to-indigo-800 p-8 text-white relative flex justify-between items-center">
        <!-- Floating shapes for aesthetics -->
        <div class="absolute top-0 right-0 p-8 pointer-events-none opacity-20">
          <i class="fa-solid fa-cube text-8xl transform rotate-12"></i>
        </div>
        
        <div>
          <h2 class="text-2xl font-black mb-1">My Profile Configuration</h2>
          <p class="text-blue-200 text-sm">Update your global system credentials and security keys.</p>
        </div>
        
        <div class="h-20 w-20 rounded-full bg-white/10 backdrop-blur-md flex items-center justify-center border-2 border-white/20 shadow-lg">
          <span class="text-3xl font-bold">{{ profileForm.get('fullName')?.value.charAt(0) || 'S' | uppercase }}</span>
        </div>
      </div>

      <div class="p-8">
        <form [formGroup]="profileForm" (ngSubmit)="onSave()" class="space-y-6">
          
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Full Name -->
            <div class="space-y-1">
              <label class="text-sm font-semibold text-gray-700">Full Name</label>
              <div class="relative">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                  <i class="fa-solid fa-user"></i>
                </span>
                <input formControlName="fullName" type="text"
                  class="pl-10 w-full rounded-lg border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 py-2.5 transition-all outline-none" placeholder="John Doe">
              </div>
              <div *ngIf="profileForm.get('fullName')?.invalid && profileForm.get('fullName')?.touched" class="text-red-500 text-xs mt-1">
                Full name is required (min 2 characters).
              </div>
            </div>

            <!-- Email (Disabled) -->
            <div class="space-y-1">
              <label class="text-sm font-semibold text-gray-700">Login Email (Read-Only)</label>
              <div class="relative">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                  <i class="fa-solid fa-envelope"></i>
                </span>
                <input formControlName="email" type="email"
                  class="pl-10 w-full rounded-lg border-gray-200 bg-gray-50 text-gray-500 shadow-sm py-2.5 cursor-not-allowed outline-none">
              </div>
            </div>

            <!-- Contact Number -->
            <div class="space-y-1">
              <label class="text-sm font-semibold text-gray-700">Contact Number</label>
              <div class="relative">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                  <i class="fa-solid fa-phone"></i>
                </span>
                <input formControlName="contactNo" type="text"
                  class="pl-10 w-full rounded-lg border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 py-2.5 outline-none" placeholder="+1 (555) 123-4567">
              </div>
            </div>

            <!-- Country -->
            <div class="space-y-1">
              <label class="text-sm font-semibold text-gray-700">Origin Country</label>
              <div class="relative">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                  <i class="fa-solid fa-globe"></i>
                </span>
                <input formControlName="country" type="text"
                  class="pl-10 w-full rounded-lg border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 py-2.5 outline-none" placeholder="United States">
              </div>
            </div>
          </div>

          <div class="flex justify-end pt-4 border-t border-gray-100">
            <button type="submit" [disabled]="profileForm.invalid"
              class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 px-6 rounded-lg shadow-md hover:shadow-lg transition-all disabled:opacity-50 disabled:cursor-not-allowed focus:ring-4 focus:ring-blue-100 outline-none">
              Save Identity
            </button>
          </div>
        </form>
      </div>
      
    </div>

    <!-- Security Panel -->
    <div *ngIf="!loading" class="bg-white rounded-xl shadow-sm border border-gray-100 p-8">
      <h3 class="text-lg font-bold text-gray-900 mb-2 flex items-center">
        <i class="fa-solid fa-shield-halved text-green-500 mr-2"></i> Security Access
      </h3>
      <p class="text-sm text-gray-500 mb-6">Modify your primary password token.</p>
      
      <!-- Change password embedded -->
      <app-change-password [isSuperAdmin]="true" (ngSubmit)="onPasswordChanged($event)"></app-change-password>
    </div>

  </main>
</div>

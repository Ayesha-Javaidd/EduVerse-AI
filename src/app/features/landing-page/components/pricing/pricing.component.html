<section id="pricing" class="py-24 bg-white">
  <div class="mx-auto max-w-7xl px-6 lg:px-8">
    <p class="text-center text-sm font-semibold uppercase tracking-[0.22em] text-[#23A997]">Pricing Plans</p>
    <app-section-title title="Flexible plans for institutions of all sizes" color="dark"></app-section-title>
    <p class="mx-auto mb-8 max-w-3xl text-center text-lg text-slate-600">
      Whether you're an independent teacher or a large university, our platform scales with you. Start for free.
    </p>


    <div class="grid gap-8 md:grid-cols-2 lg:grid-cols-3 items-center">
      <div *ngFor="let tier of tiers" 
           class="fade-in rounded-[30px] border p-8 xl:p-10 transition-all duration-300"
           [ngClass]="tier.highlighted ? 'border-[#23A997] bg-[#f8f9fc] shadow-xl relative scale-105' : 'border-[#e2e8f0] bg-white shadow-sm'">
        
        <div *ngIf="tier.highlighted" class="absolute top-0 right-6 -translate-y-1/2">
          <span class="inline-flex items-center rounded-full bg-[#23A997] px-3 py-1 text-xs font-semibold text-white">
            Most Popular
          </span>
        </div>

        <h3 class="text-2xl font-bold text-[#181F39]">{{ tier.name }}</h3>
        <p class="mt-2 text-sm text-slate-500 min-h-[40px]">{{ tier.description }}</p>
        
        <div class="mt-6 mb-8">
          <span class="text-5xl font-extrabold text-[#181F39]">${{ tier.monthlyPrice }}</span>
          <span class="text-base font-medium text-slate-500">/mo</span>
        </div>

        <ul class="space-y-4 mb-8">
          <li *ngFor="let feature of tier.features" class="flex items-start gap-3 text-sm text-slate-600">
            <span class="mt-0.5 flex h-5 w-5 items-center justify-center rounded-full bg-[#ecf9f6] text-[10px] font-bold text-[#23A997]">✓</span>
            <span>{{ feature }}</span>
          </li>
        </ul>

        <app-button
          [fullWidth]="true"
          (buttonClick)="navigateToAdminSignup()"
          [variant]="tier.highlighted ? 'primary' : 'outline'"
          [class]="tier.highlighted ? 'rounded-full' : 'rounded-full border-[#dbe4ea] bg-white text-slate-700 hover:bg-slate-50'">
          Get Started
        </app-button>
      </div>
    </div>
  </div>
</section>
